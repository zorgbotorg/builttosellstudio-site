<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" role="img" aria-label="Built to Sell Studio logo">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#FFF7ED"/>
      <stop offset="100%" stop-color="#FFE4CC"/>
    </linearGradient>
    <linearGradient id="acc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#F97316"/>
      <stop offset="100%" stop-color="#EA580C"/>
    </linearGradient>
  </defs>

  <rect x="24" y="24" width="464" height="464" rx="104" fill="url(#bg)"/>

  <!-- Shopping bag mark -->
  <rect x="136" y="166" width="240" height="220" rx="34" fill="#ffffff" stroke="#FDBA74" stroke-width="10"/>
  <path d="M184 196c0-40 29-68 72-68s72 28 72 68" fill="none" stroke="#FB923C" stroke-width="16" stroke-linecap="round"/>

  <!-- B + S monogram -->
  <g transform="translate(0,4)">
    <text x="193" y="312" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="124" font-weight="800" fill="url(#acc)">B</text>
    <text x="264" y="312" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="124" font-weight="800" fill="#9A3412">S</text>
  </g>

  <!-- Studio label -->
  <rect x="164" y="336" width="184" height="38" rx="19" fill="#FFF1E6" stroke="#FED7AA"/>
  <text x="256" y="361" text-anchor="middle" font-family="Inter,Segoe UI,Arial,sans-serif" font-size="18" font-weight="700" fill="#9A3412" letter-spacing="1">STUDIO</text>
</svg>
